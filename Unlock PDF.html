<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate PDF Unlocker & Inverter</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --accent: #ff00c8; --bg: #000428; }
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
            background: var(--bg); color: white; height: 100vh;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }

        /* Animated Nebula Background */
        .nebula {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #004e92, #000428);
            z-index: -2;
        }
        .stars {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            animation: moveStars 100s linear infinite; z-index: -1; opacity: 0.5;
        }
        @keyframes moveStars { from { background-position: 0 0; } to { background-position: 10000px 5000px; } }

        .card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px; border-radius: 30px;
            width: 480px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .upload-zone {
            border: 2px dashed var(--accent);
            padding: 40px; border-radius: 20px;
            cursor: pointer; transition: 0.3s; margin-bottom: 20px;
        }
        .upload-zone:hover { background: rgba(255, 0, 200, 0.1); border-color: #fff; }

        input[type="password"] {
            width: 100%; padding: 12px; margin: 10px 0;
            border-radius: 10px; border: none; background: rgba(255,255,255,0.1);
            color: white; outline: none; border: 1px solid transparent;
        }
        input[type="password"]:focus { border-color: var(--accent); }

        button {
            background: linear-gradient(90deg, #ff00c8, #ff0055);
            color: white; border: none; padding: 15px 30px;
            border-radius: 12px; font-weight: bold; cursor: pointer;
            width: 100%; font-size: 16px; transition: 0.3s;
        }
        button:hover:not(:disabled) { transform: scale(1.03); box-shadow: 0 0 20px var(--accent); }
        button:disabled { opacity: 0.4; cursor: not-allowed; }

        .progress-box {
            width: 100%; height: 6px; background: rgba(255,255,255,0.1);
            border-radius: 10px; margin-top: 25px; display: none; overflow: hidden;
        }
        #bar { width: 0%; height: 100%; background: var(--accent); transition: 0.2s; }
        #status { font-size: 12px; margin-top: 10px; color: #aaa; }
    </style>
</head>
<body>

<div class="nebula"></div>
<div class="stars"></div>

<div class="card">
    <h1 style="margin:0; font-size: 24px; letter-spacing: 1px;">PDF UNLOCKER PRO</h1>
    <p style="opacity: 0.6; font-size: 13px;">Batch 50 Files | Max 5GB Total</p>

    <div class="upload-zone" id="dropZone">
        <div id="fileInfo">Click to upload encrypted PDFs</div>
        <input type="file" id="fileInput" multiple accept=".pdf" style="display: none;">
    </div>

    <input type="password" id="masterPass" placeholder="Enter Password (if required)">
    
    <div style="margin: 15px 0;">
        <input type="checkbox" id="invertCheck"> <label for="invertCheck">Invert Colors (Negative)</label>
    </div>

    <button id="startBtn" disabled>UNLOCK & DOWNLOAD ZIP</button>

    <div class="progress-box" id="progressWrap">
        <div id="bar"></div>
    </div>
    <div id="status">Waiting for input...</div>
</div>

<script>
    const { PDFDocument, rgb } = PDFLib;
    const fileInput = document.getElementById('fileInput');
    const startBtn = document.getElementById('startBtn');
    const status = document.getElementById('status');
    const bar = document.getElementById('bar');
    const progressWrap = document.getElementById('progressWrap');
    
    let selectedFiles = [];

    document.getElementById('dropZone').onclick = () => fileInput.click();

    fileInput.onchange = (e) => {
        selectedFiles = Array.from(e.target.files).slice(0, 50);
        if (selectedFiles.length > 0) {
            document.getElementById('fileInfo').innerText = `${selectedFiles.length} files selected`;
            startBtn.disabled = false;
        }
    };

    startBtn.onclick = async () => {
        startBtn.disabled = true;
        progressWrap.style.display = 'block';
        const zip = new JSZip();
        const password = document.getElementById('masterPass').value;
        const shouldInvert = document.getElementById('invertCheck').checked;

        try {
            for (let i = 0; i < selectedFiles.length; i++) {
                const file = selectedFiles[i];
                status.innerText = `Decrypting: ${file.name}...`;
                
                const arrayBuffer = await file.arrayBuffer();
                
                // Load PDF (Attempt decryption if password provided)
                const pdfDoc = await PDFDocument.load(arrayBuffer, { 
                    password: password,
                    ignoreEncryption: true // This strips "Owner" restrictions instantly
                });

                if (shouldInvert) {
                    const pages = pdfDoc.getPages();
                    pages.forEach(page => {
                        const { width, height } = page.getSize();
                        page.drawRectangle({
                            x: 0, y: 0, width, height,
                            color: rgb(1, 1, 1), blendMode: 'Difference'
                        });
                    });
                }

                // Saving creates a brand new PDF without the encryption flags
                const pdfBytes = await pdfDoc.save();
                zip.file(`unlocked_${file.name}`, pdfBytes);
                
                bar.style.width = ((i + 1) / selectedFiles.length * 100) + '%';
            }

            status.innerText = "Building ZIP Archive...";
            const content = await zip.generateAsync({ type: "blob" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(content);
            link.download = "Unlocked_Batch.zip";
            link.click();
            
            status.innerText = "All files unlocked successfully.";
        } catch (err) {
            status.innerText = "Error: Incorrect password or corrupted file.";
            console.error(err);
        } finally {
            startBtn.disabled = false;
        }
    };
</script>

</body>
</html>
