<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            padding: 20px;
            overflow-x: hidden;
        }
        
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            max-width: 1200px;
            width: 100%;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 350px;
            padding: 30px;
            position: relative;
            overflow: hidden;
            transition: transform 0.5s ease, box-shadow 0.5s ease;
            animation: float 6s ease-in-out infinite;
        }
        
        .card:hover {
            transform: translateY(-15px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
        }
        
        .card:nth-child(1) {
            animation-delay: 0s;
        }
        
        .card:nth-child(2) {
            animation-delay: 0.5s;
        }
        
        .card:nth-child(3) {
            animation-delay: 1s;
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, #ff8a00, #e52e71, #9d50bb, #654ea3);
            background-size: 400% 400%;
            animation: gradientSlide 3s ease infinite;
        }
        
        @keyframes gradientSlide {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }
        
        .profile-header {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            animation: fadeIn 1s ease forwards;
            opacity: 0;
        }
        
        .card:nth-child(1) .profile-header {
            animation-delay: 0.2s;
        }
        
        .card:nth-child(2) .profile-header {
            animation-delay: 0.4s;
        }
        
        .card:nth-child(3) .profile-header {
            animation-delay: 0.6s;
        }
        
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #f1f1f1;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.5s ease;
        }
        
        .profile-img:hover {
            transform: scale(1.1) rotate(5deg);
        }
        
        .profile-info {
            margin-left: 20px;
        }
        
        .name {
            font-size: 1.8rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 5px;
        }
        
        .title {
            font-size: 1rem;
            color: #6a11cb;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .company {
            font-size: 0.9rem;
            color: #777;
            font-weight: 500;
        }
        
        .contact-details {
            margin-top: 20px;
            animation: fadeIn 1s ease forwards;
            opacity: 0;
            animation-delay: 0.5s;
        }
        
        .contact-item {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            padding: 12px 15px;
            background: #f8f9fa;
            border-radius: 10px;
            transition: all 0.3s ease;
            transform: translateX(-20px);
            opacity: 0;
            animation: slideIn 0.5s ease forwards;
        }
        
        .contact-item:hover {
            background: #eef2ff;
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }
        
        .card:nth-child(1) .contact-item:nth-child(1) {
            animation-delay: 0.3s;
        }
        
        .card:nth-child(1) .contact-item:nth-child(2) {
            animation-delay: 0.4s;
        }
        
        .card:nth-child(1) .contact-item:nth-child(3) {
            animation-delay: 0.5s;
        }
        
        .card:nth-child(1) .contact-item:nth-child(4) {
            animation-delay: 0.6s;
        }
        
        .card:nth-child(2) .contact-item:nth-child(1) {
            animation-delay: 0.5s;
        }
        
        .card:nth-child(2) .contact-item:nth-child(2) {
            animation-delay: 0.6s;
        }
        
        .card:nth-child(2) .contact-item:nth-child(3) {
            animation-delay: 0.7s;
        }
        
        .card:nth-child(2) .contact-item:nth-child(4) {
            animation-delay: 0.8s;
        }
        
        .card:nth-child(3) .contact-item:nth-child(1) {
            animation-delay: 0.7s;
        }
        
        .card:nth-child(3) .contact-item:nth-child(2) {
            animation-delay: 0.8s;
        }
        
        .card:nth-child(3) .contact-item:nth-child(3) {
            animation-delay: 0.9s;
        }
        
        .card:nth-child(3) .contact-item:nth-child(4) {
            animation-delay: 1s;
        }
        
        @keyframes slideIn {
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }
        
        .icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 15px;
            color: white;
            font-size: 1.2rem;
        }
        
        .phone .icon {
            background: linear-gradient(135deg, #36d1dc, #5b86e5);
        }
        
        .email .icon {
            background: linear-gradient(135deg, #ff8a00, #e52e71);
        }
        
        .location .icon {
            background: linear-gradient(135deg, #9d50bb, #654ea3);
        }
        
        .website .icon {
            background: linear-gradient(135deg, #00b09b, #96c93d);
        }
        
        .contact-text {
            flex: 1;
        }
        
        .contact-label {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 3px;
        }
        
        .contact-value {
            font-size: 1rem;
            color: #333;
            font-weight: 600;
        }
        
        .social-links {
            display: flex;
            justify-content: center;
            margin-top: 25px;
            animation: fadeIn 1s ease forwards;
            opacity: 0;
            animation-delay: 0.8s;
        }
        
        .social-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 8px;
            color: white;
            font-size: 1.2rem;
            text-decoration: none;
            transition: all 0.3s ease;
            transform: scale(0);
            animation: popIn 0.5s ease forwards;
        }
        
        .card:nth-child(1) .social-icon:nth-child(1) {
            animation-delay: 0.9s;
        }
        
        .card:nth-child(1) .social-icon:nth-child(2) {
            animation-delay: 1s;
        }
        
        .card:nth-child(1) .social-icon:nth-child(3) {
            animation-delay: 1.1s;
        }
        
        .card:nth-child(2) .social-icon:nth-child(1) {
            animation-delay: 1.1s;
        }
        
        .card:nth-child(2) .social-icon:nth-child(2) {
            animation-delay: 1.2s;
        }
        
        .card:nth-child(2) .social-icon:nth-child(3) {
            animation-delay: 1.3s;
        }
        
        .card:nth-child(3) .social-icon:nth-child(1) {
            animation-delay: 1.3s;
        }
        
        .card:nth-child(3) .social-icon:nth-child(2) {
            animation-delay: 1.4s;
        }
        
        .card:nth-child(3) .social-icon:nth-child(3) {
            animation-delay: 1.5s;
        }
        
        @keyframes popIn {
            to {
                transform: scale(1);
            }
        }
        
        .social-icon:hover {
            transform: scale(1.2) translateY(-5px);
        }
        
        .facebook {
            background: #3b5998;
        }
        
        .twitter {
            background: #1da1f2;
        }
        
        .linkedin {
            background: #0077b5;
        }
        
        .instagram {
            background: linear-gradient(45deg, #405de6, #5851db, #833ab4, #c13584, #e1306c, #fd1d1d);
        }
        
        .github {
            background: #333;
        }
        
        .card-footer {
            text-align: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #eee;
            color: #888;
            font-size: 0.85rem;
            animation: fadeIn 1s ease forwards;
            opacity: 0;
            animation-delay: 1.2s;
        }
        
        .pulse {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4CAF50;
            margin-right: 8px;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% {
                transform: scale(0.9);
                box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7);
            }
            
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 10px rgba(76, 175, 80, 0);
            }
            
            100% {
                transform: scale(0.9);
                box-shadow: 0 0 0 0 rgba(76, 175, 80, 0);
            }
        }
        
        .hint {
            text-align: center;
            color: white;
            margin-top: 30px;
            font-size: 1.1rem;
            font-weight: 500;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            animation: fadeIn 2s ease;
        }
        
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                align-items: center;
            }
            
            .card {
                width: 100%;
                max-width: 400px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Card 1: Developer -->
        <div class="card">
            <div class="profile-header">
                <img src="Rakibul about picture.jpg" alt="Profile" class="profile-img">
                <div class="profile-info">
                    <h1 class="name">MD RAKIBUL ISLAM</h1>
                    <p class="title">Senior Web Developer</p>
                    <p class="company">RAKIBUL IT</p>
                </div>
            </div>
            
            <div class="contact-details">
                <div class="contact-item phone">
                    <div class="icon">
                        <i class="fas fa-phone"></i>
                    </div>
                    <div class="contact-text">
                        <div class="contact-label">Phone</div>
                        <div class="contact-value">09603915428</div>
                    </div>
                </div>
                
                <div class="contact-item email">
                    <div class="icon">
                        <i class="fas fa-envelope"></i>
                    </div>
                    <div class="contact-text">
                        <div class="contact-label">Email</div>
                        <div class="contact-value">rakibul8340407@gmail.com</div>
                    </div>
                </div>
                
                <div class="contact-item location">
                    <div class="icon">
                        <i class="fas fa-map-marker-alt"></i>
                    </div>
                    <div class="contact-text">
                        <div class="contact-label">Location</div>
                        <div class="contact-value">CHANDRA,SHALIKHA,MAGURA</div>
                    </div>
                </div>
                
                <div class="contact-item website">
                    <div class="icon">
                        <i class="fas fa-globe"></i>
                    </div>
                    <div class="contact-text">
                        <div class="contact-label">Website</div>
                        <div class="contact-value">https://rakibul667.top</div>
                    </div>
                </div>
            </div>
            
            <div class="social-links">
                <a href="#" class="social-icon twitter">
                    <i class="fab fa-twitter"></i>
                </a>
                <a href="#" class="social-icon linkedin">
                    <i class="fab fa-linkedin-in"></i>
                </a>
                <a href="#" class="social-icon github">
                    <i class="fab fa-github"></i>
                </a>
            </div>
            
            <div class="card-footer">
                <span class="pulse"></span> Available for freelance projects
            </div>
        </div>
    <script>
        // Add click animation to contact items
        document.querySelectorAll('.contact-item').forEach(item => {
            item.addEventListener('click', function() {
                this.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    this.style.transform = '';
                }, 150);
            });
        });
        
        // Add random color pulse to online status
        const pulses = document.querySelectorAll('.pulse');
        const colors = ['#4CAF50', '#2196F3', '#FF9800', '#9C27B0', '#F44336'];
        
        setInterval(() => {
            pulses.forEach(pulse => {
                const randomColor = colors[Math.floor(Math.random() * colors.length)];
                pulse.style.background = randomColor;
            });
        }, 3000);
        
        // Background animation
        const body = document.querySelector('body');
        let hue = 200;
        
        setInterval(() => {
            hue = (hue + 1) % 360;
            body.style.background = `linear-gradient(135deg, hsl(${hue}, 70%, 50%) 0%, hsl(${(hue + 60) % 360}, 70%, 50%) 100%)`;
        }, 100);
    </script>
</body>
</html>
